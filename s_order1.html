<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生暉食品營運｜今日特價下單</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f4f6f8;
      color: #2b2b2b;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px;
    }
    .hero {
      background: linear-gradient(135deg, #557c8a, #7aa0a6);
      color: #fff;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      margin-bottom: 16px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.3;
    }
    .hero p {
      margin: 0;
      line-height: 1.7;
      opacity: 0.95;
    }
    .notice {
      background: #fff7e8;
      border: 1px solid #f0d49a;
      color: #7a5610;
      padding: 12px 14px;
      border-radius: 12px;
      margin: 16px 0;
      font-size: 15px;
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 22px;
      color: #3e5d67;
    }
    .product {
      border: 1px solid #dbe3e8;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fbfcfd;
    }
    .product:last-child { margin-bottom: 0; }
    .product-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
    }
    .product-name {
      font-size: 18px;
      font-weight: bold;
      color: #24363c;
      line-height: 1.4;
    }
    .product-spec {
      color: #6a7c83;
      font-size: 13px;
      margin-top: 4px;
    }
    .tag-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }
    .tag.hot { background: #e7f3f6; color: #3f6d78; }
    .tag.bulk { background: #eef6ea; color: #51723b; }
    .tag.limited { background: #fff0e8; color: #b85b28; }
    .price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0 10px;
      flex-wrap: wrap;
    }
    .old-price {
      text-decoration: line-through;
      color: #9a9a9a;
      font-size: 14px;
    }
    .new-price {
      color: #d64b2d;
      font-weight: bold;
      font-size: 22px;
    }
    .save-badge {
      background: #fff1ec;
      color: #c04f2c;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 999px;
    }
    .desc {
      color: #5c6e75;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .qty-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .qty-row label {
      font-size: 14px;
      color: #54656c;
      min-width: 74px;
    }
    input[type="number"], input[type="text"], input[type="tel"], textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cfd8dd;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }
    input[type="number"] {
      max-width: 130px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #53646b;
      font-weight: bold;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    .summary {
      background: #f5fafb;
      border: 1px solid #d8eaee;
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
      line-height: 1.8;
      font-size: 15px;
    }
    .total {
      font-size: 24px;
      font-weight: bold;
      color: #d64b2d;
    }
    .btn {
      border: 0;
      width: 100%;
      padding: 15px 18px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary {
      background: #4e7a85;
      color: #fff;
      margin-top: 14px;
    }
    .btn-primary:hover { opacity: 0.92; }
    .btn-secondary {
      background: #edf3f5;
      color: #48636b;
      margin-top: 10px;
    }
    .line-box {
      background: #f1fbf1;
      border: 1px solid #cfe9cf;
      color: #2f6a31;
      padding: 12px;
      border-radius: 12px;
      margin-top: 12px;
      line-height: 1.7;
      font-size: 14px;
      word-break: break-all;
    }
    .sticky-card {
      position: sticky;
      top: 18px;
    }
    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 26px; }
      .sticky-card { position: static; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>今日特價下單(測試中請勿下單)</h1>
      <p>歡迎直接勾選今日特價商品後送出。送出後將由生暉食品營運人員與您確認庫存、金額與取貨／配送方式。</p>
    </div>

    <div class="notice">
      今日特價不定期有即期品及破盤商品特賣。<br>
         </div>

    <div class="grid">
      <div class="card">
        <h2>今日特價商品</h2>
        <div id="productList">
          <div class="product">
            <div class="product-name">載入中...</div>
            <div class="desc">正在讀取今日特價商品資料。</div>
          </div>
        </div>
      </div>

      <div class="card sticky-card">
        <h2>填寫下單資料</h2>

        <div class="field">
          <label for="customerName">姓名 / 店名</label>
          <input type="text" id="customerName" placeholder="例如：王先生 / 富利早餐加盟店" />
        </div>

        <div class="field">
          <label for="customerPhone">手機號碼</label>
          <input type="tel" id="customerPhone" placeholder="例如：0912345678" />
        </div>

        <div class="field">
          <label for="customerType">需求類型</label>
          <select id="customerType">
            <option value="門市自取">門市自取</option>
            <option value="商業配送">商業配送</option>
            <option value="外送需求">外送需求</option>
            <option value="先詢價">先詢價</option>
          </select>
        </div>

        <div class="field">
          <label for="pickupTime">希望時段</label>
          <select id="pickupTime">
            <option value="越快越好">越快越好</option>
            <option value="上午">上午</option>
            <option value="下午">下午</option>
            <option value="晚上">晚上</option>
          </select>
        </div>

        <div class="field">
          <label for="customerNote">備註</label>
          <textarea id="customerNote" placeholder="例如：今天下午取貨 / 請先幫我留貨 / 配送時段需求"></textarea>
        </div>

        <div class="summary" id="summaryBox">尚未選擇商品</div>

        <button class="btn btn-primary" onclick="sendToLine()">送出 LINE 下單訊息</button>
        <button class="btn btn-secondary" onclick="clearForm()">清空重填</button>

        <div class="line-box">
          後台資料來源：系統自動更新版。
        </div>
      </div>
    </div>
  </div>

  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4zMKFY__3ejptHmdbgxbSobb-3DSTsCFE2tw5D0lEmX0JuSXiObKGlfBoWTXBkcpjlitnz9Q_yLJD/pub?gid=0&single=true&output=csv';
    const LINE_OA_ID = '@gogo-food';
    const MAX_PRODUCTS = 4;

    let products = [];

    function currency(n) {
      return '$' + Number(n || 0).toLocaleString('zh-TW');
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getTagClass(tagText) {
      const text = String(tagText || '');
      if (text.includes('限量')) return 'limited';
      if (text.includes('補貨') || text.includes('熱賣') || text.includes('包材')) return 'bulk';
      return 'hot';
    }
function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(cell);
      cell = '';
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && next === '\n') i++;
      row.push(cell);
      if (row.some(v => String(v).trim() !== '')) rows.push(row);
      row = [];
      cell = '';
    } else {
      cell += char;
    }
  }

  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    if (row.some(v => String(v).trim() !== '')) rows.push(row);
  }

  if (!rows.length) return [];

  const headers = rows[0].map(h => String(h || '').trim());
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, idx) => {
      obj[h] = (r[idx] || '').trim();
    });
    return obj;
  });
}
    
    function normalizeProducts(rawRows) {
      return rawRows
        .filter(r => {
          const enabled = String(r['啟用'] || r['enabled'] || '').toUpperCase();
          return enabled === 'TRUE' || enabled === '1' || enabled === 'Y' || enabled === 'YES';
        })
        .sort((a, b) => Number(a['排序'] || 999) - Number(b['排序'] || 999))
        .slice(0, MAX_PRODUCTS)
        .map((r, idx) => ({
          id: 'qty' + (idx + 1),
          name: r['商品名稱'] || '未命名商品',
          spec: r['規格說明'] || '',
          oldPrice: Number(r['原價'] || 0),
          price: Number(r['特價'] || 0),
          tag1: r['標籤1'] || '',
          tag2: r['效期'] || '',
          desc: r['商品說明'] || ''
        }));
    }

    function renderProducts() {
      const productList = document.getElementById('productList');

      if (!products.length) {
        productList.innerHTML = `
          <div class="product">
            <div class="product-name">目前沒有可顯示商品</div>
            <div class="desc">請到 Google Sheet 確認是否有啟用商品，且欄位名稱正確。</div>
          </div>
        `;
        updateSummary();
        return;
      }

      productList.innerHTML = products.map((p) => {
        const save = Math.max(0, p.oldPrice - p.price);
        const tags = [p.tag1, p.tag2 ? `⚠️ 效期：${p.tag2}` : ''] .filter(Boolean).map(tag => `
          <span class="tag ${getTagClass(tag)}">${escapeHtml(tag)}</span>
        `).join('');

        return `
          <div class="product">
            <div class="product-head">
              <div>
                <div class="product-name">${escapeHtml(p.name)}</div>
                <div class="product-spec">${escapeHtml(p.spec || '')}</div>
              </div>
              <div class="tag-group">${tags}</div>
            </div>
            <div class="price-row">
              <span class="old-price">原價 ${currency(p.oldPrice)}</span>
              <span class="new-price">特價 ${currency(p.price)}</span>
              <span class="save-badge">現省 ${currency(save)}</span>
            </div>
            <div class="desc">${escapeHtml(p.desc || '請填寫商品說明')}</div>
            <div class="qty-row">
              <label for="${p.id}">下單數量</label>
              <input type="number" id="${p.id}" min="0" value="0" onchange="updateSummary()" />
            </div>
          </div>
        `;
      }).join('');

      updateSummary();
    }

    async function loadProducts() {
      const productList = document.getElementById('productList');

      if (!SHEET_CSV_URL || SHEET_CSV_URL.includes('請改成你的GoogleSheet')) {
        productList.innerHTML = `
          <div class="product">
            <div class="product-name">尚未設定 Google Sheet</div>
            <div class="desc">請先把 SHEET_CSV_URL 改成你發布後的 Google Sheet CSV 網址。</div>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch(SHEET_CSV_URL + (SHEET_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now());
        if (!response.ok) throw new Error('讀取失敗');
        const csvText = await response.text();
        const rawRows = parseCSV(csvText);
        products = normalizeProducts(rawRows);
        renderProducts();
      } catch (error) {
        productList.innerHTML = `
          <div class="product">
            <div class="product-name">商品載入失敗</div>
            <div class="desc">請確認 Google Sheet 是否已發布為 CSV，網址是否正確，且允許外部讀取。</div>
          </div>
        `;
      }
    }

    function updateSummary() {
      const summaryBox = document.getElementById('summaryBox');
      let lines = [];
      let total = 0;

      products.forEach(p => {
        const el = document.getElementById(p.id);
        const qty = Number(el ? el.value : 0);
        if (qty > 0) {
          const subtotal = qty * p.price;
          total += subtotal;
          lines.push(`${p.name} × ${qty} = ${currency(subtotal)}`);
        }
      });

      if (lines.length === 0) {
        summaryBox.innerHTML = '尚未選擇商品';
        return;
      }

      summaryBox.innerHTML = `
        <strong>訂單摘要</strong><br>
        ${lines.join('<br>')}
        <hr style="border:none;border-top:1px solid #d9e5e9;margin:10px 0;">
        預估合計：<span class="total">${currency(total)}</span>
      `;
    }

    function sendToLine() {
      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();
      const type = document.getElementById('customerType').value;
      const pickupTime = document.getElementById('pickupTime').value;
      const note = document.getElementById('customerNote').value.trim();

      let orderLines = [];
      let total = 0;

      products.forEach(p => {
        const el = document.getElementById(p.id);
        const qty = Number(el ? el.value : 0);
        if (qty > 0) {
          const subtotal = qty * p.price;
          total += subtotal;
          orderLines.push(`- ${p.name} × ${qty} = ${currency(subtotal)}`);
        }
      });

      if (!name) {
        alert('請先填寫姓名或店名');
        return;
      }

      if (!phone) {
        alert('請先填寫手機號碼');
        return;
      }

      if (orderLines.length === 0) {
        alert('請至少選擇一項商品');
        return;
      }

      if (!LINE_OA_ID || LINE_OA_ID.includes('你的LINE')) {
        alert('請先設定 LINE 官方帳號 ID');
        return;
      }

      const message = `生暉食品營運｜今日特價下單

姓名/店名：${name}
手機：${phone}
需求類型：${type}
希望時段：${pickupTime}

下單內容：
${orderLines.join('\n')}

預估合計：${currency(total)}

備註：${note || '無'}`;
      const lineUrl = `https://line.me/R/oaMessage/${LINE_OA_ID}/?${encodeURIComponent(message)}`;
      window.open(lineUrl, '_blank');
    }

    function clearForm() {
      document.getElementById('customerName').value = '';
      document.getElementById('customerPhone').value = '';
      document.getElementById('customerType').selectedIndex = 0;
      document.getElementById('pickupTime').selectedIndex = 0;
      document.getElementById('customerNote').value = '';
      products.forEach(p => {
        const el = document.getElementById(p.id);
        if (el) el.value = 0;
      });
      updateSummary();
    }

    loadProducts();
  </script>
</body>
</html>
