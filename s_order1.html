<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生暉食品｜今日特價下單</title>

<style>
body {
  font-family: "Microsoft JhengHei", sans-serif;
  background: #f5f6f7;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
}

.title {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 10px;
}

.product {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.product-name {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 5px;
}

.price {
  margin: 8px 0;
}

.old {
  text-decoration: line-through;
  color: #888;
  margin-right: 8px;
}

.new {
  color: #e53935;
  font-size: 20px;
  font-weight: bold;
}

.qty {
  width: 80px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.section {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 15px;
  background: #4CAF50;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
}

button:hover {
  background: #43a047;
}
</style>
</head>

<body>

<h1>今日特價下單</h1>

<div class="card">
  <h2>今日特價商品</h2>
  <div id="productList">載入中...</div>
</div>

<div class="card">
  <h2>填寫資料</h2>
  
  <input id="name" placeholder="姓名 / 店名">
  <input id="phone" placeholder="手機">
  
  <select id="type">
    <option>門市自取</option>
    <option>商業配送</option>
    <option>外送</option>
  </select>

  <textarea id="note" placeholder="備註"></textarea>

  <button onclick="sendOrder()">送出LINE訂單</button>
</div>

<script>

// 👉改這兩個就好
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4zMKFY__3ejptHmdbgxbSobb-3DSTsCFE2tw5D0lEmX0JuSXiObKGlfBoWTXBkcpjlitnz9Q_yLJD/pub?gid=0&single=true&output=csv';
const LINE_ID = '@gogo-food';

let products = [];

function parseCSV(text) {
  const rows = text.split('\n').map(r => r.split(','));
  const headers = rows[0];

  return rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });
}

function loadProducts() {
  fetch(SHEET_CSV_URL)
    .then(res => res.text())
    .then(text => {
      let data = parseCSV(text);

      products = data
        .filter(x => x['啟用'] === 'TRUE')
        .sort((a,b)=>a['排序']-b['排序'])
        .slice(0,4);

      renderProducts();
    });
}

function renderProducts() {
  let html = '';

  products.forEach((p,i)=>{
    html += `
    <div class="product">
      <b>${p['商品名稱']}</b><br>
      原價 ${p['原價']} → <b style="color:red">特價 ${p['特價']}</b><br>
      <input type="number" id="qty${i}" placeholder="數量">
    </div>`;
  });

  document.getElementById('productList').innerHTML = html;
}

function sendOrder() {

  let name = document.getElementById('name').value;
  let phone = document.getElementById('phone').value;
  let type = document.getElementById('type').value;
  let note = document.getElementById('note').value;

  let msg = `生暉食品訂單\n\n`;
  msg += `姓名:${name}\n手機:${phone}\n類型:${type}\n\n`;

  products.forEach((p,i)=>{
    let qty = document.getElementById(`qty${i}`).value;
    if(qty > 0){
      msg += `${p['商品名稱']} x ${qty}\n`;
    }
  });

  msg += `\n備註:${note}`;

  window.open(`https://line.me/R/oaMessage/${LINE_ID}/?${encodeURIComponent(msg)}`);
}

loadProducts();

</script>

</body>
</html>
