<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生暉會員系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      margin: 0;
    }
    .box {
      max-width: 420px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    h2 {
      margin-top: 0;
      margin-bottom: 18px;
    }
    input, button, a.btn {
      width: 100%;
      padding: 14px;
      box-sizing: border-box;
      font-size: 16px;
      margin-top: 12px;
      border-radius: 8px;
    }
    input {
      border: 1px solid #ddd;
    }
    button, a.btn {
      background: #111;
      color: #fff;
      border: none;
      text-align: center;
      text-decoration: none;
      display: block;
      cursor: pointer;
    }
    button:disabled {
      background: #777;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 16px;
      line-height: 1.6;
      font-size: 16px;
      white-space: pre-line;
    }
    .ok { color: #0a7a2f; }
    .err { color: #c62828; }
  </style>
</head>
<body>
  <div class="box">
    <h2>生暉會員系統</h2>

    <input id="card" placeholder="輸入會員卡號">
    <input id="phone" placeholder="手機號碼">

    <button id="bindBtn" onclick="bindMember()" disabled>綁定會員</button>

    <a class="btn" href="https://script.google.com/macros/s/AKfycbydHmebdQd5E68vx46tNB0nYZALToMWswpjJMLlLTdQTylGBcKmhGoe3lcvQtu76fI6vQ/exec">
      新會員註冊
    </a>

    <div id="msg" class="msg err">LINE 初始化中...</div>
  </div>

  <script>
    const LIFF_ID = "2009558075-UsjkbzNW";
    const API_URL = "https://script.google.com/macros/s/AKfycbwDm3Txn-7NqlmDGIyTqmxB2CBBa14u3HZwzgYwlpbwU_KXqxKd3jXnu52Uhqhi6N7D/exec";

    let userId = "";
    let lineName = "";
    let liffReady = false;

    function setMsg(text, isError) {
      const msg = document.getElementById("msg");
      msg.className = "msg " + (isError ? "err" : "ok");
      msg.innerText = text || "";
    }

    function setReady(ready) {
      liffReady = ready;
      document.getElementById("bindBtn").disabled = !ready;
    }

    async function initLIFF() {
      setReady(false);
      setMsg("LINE 初始化中...", true);

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isInClient()) {
          setMsg("請從 LINE 內開啟此頁面", true);
          return;
        }

        const profile = await liff.getProfile();
        userId = profile.userId || "";
        lineName = profile.displayName || "";

        if (!userId) {
          setMsg("已進入 LINE，但無法取得 LINE 身分", true);
          return;
        }

        setReady(true);
        setMsg("成功\n已取得 LINE 身分：" + lineName, false);

      } catch (err) {
        setMsg("LIFF 初始化失敗：" + (err && err.message ? err.message : err), true);
      }
    }

    async function bindMember() {
      const card = document.getElementById("card").value.trim();
      const phone = document.getElementById("phone").value.trim();

      if (!card || !phone) {
        setMsg("請輸入會員卡號與手機號碼", true);
        return;
      }

      if (!liffReady) {
        setMsg("LINE 尚未初始化完成", true);
        return;
      }

      if (!userId) {
        setMsg("無法取得 LINE 身分，請重新開啟頁面", true);
        return;
      }

      setMsg("送出綁定中...", true);
      setReady(false);

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "bindOldMember",
            card: card,
            phone: phone,
            userId: userId,
            lineName: lineName
          })
        });

        const result = await res.json();
        setMsg(result.message, !result.ok);

        if (result.ok) {
          document.getElementById("card").value = "";
          document.getElementById("phone").value = "";
        }

      } catch (err) {
        setMsg("系統錯誤：" + err.message, true);
      }

      setReady(true);
    }

    window.onload = function() {
      initLIFF();
    };
  </script>
</body>
</html>
