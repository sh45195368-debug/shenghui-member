<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生暉｜客訂／報價填寫</title>
  <style>
    :root{
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#222;
      --muted:#666;
      --line:#06C755;
      --border:#ddd;
      --btn:#222;
      --btn2:#555;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      font-family:Arial, "Noto Sans TC", sans-serif;
      color:var(--text);
      padding:20px 14px 40px;
    }
    .wrap{
      max-width:560px;
      margin:0 auto;
    }
    .card{
      background:var(--card);
      border-radius:16px;
      padding:20px;
      box-shadow:0 4px 16px rgba(0,0,0,.08);
    }
    h1{
      font-size:26px;
      margin:0 0 8px;
    }
    .sub{
      color:var(--muted);
      line-height:1.6;
      margin:0 0 18px;
      font-size:15px;
    }
    .grid{
      display:grid;
      gap:12px;
    }
    label{
      display:block;
      font-size:14px;
      font-weight:700;
      margin-bottom:6px;
    }
    input, select, textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:10px;
      padding:12px 12px;
      font-size:16px;
      background:#fff;
    }
    textarea{
      resize:vertical;
      min-height:96px;
      line-height:1.5;
    }
    .two{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .three{
      display:grid;
      grid-template-columns:1.1fr .8fr .8fr;
      gap:12px;
    }
    .section-title{
      margin-top:6px;
      font-size:16px;
      font-weight:700;
    }
    .btns{
      display:grid;
      gap:10px;
      margin-top:16px;
    }
    button{
      border:none;
      border-radius:12px;
      padding:14px 16px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }
    .btn-generate{ background:var(--btn); color:#fff; }
    .btn-copy{ background:var(--btn2); color:#fff; }
    .btn-line{ background:var(--line); color:#fff; }

    .output{
      margin-top:18px;
    }
    .output textarea{
      min-height:220px;
      background:#fcfcfc;
    }

    .qty-box{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .qty-btn{
      width:44px;
      min-width:44px;
      height:44px;
      border:none;
      border-radius:10px;
      background:#222;
      color:#fff;
      font-size:22px;
      font-weight:700;
      padding:0;
      line-height:1;
      cursor:pointer;
    }
    .qty-input{
      text-align:center;
      padding:12px 8px;
      font-weight:700;
    }

    .footer-note{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    @media (max-width:520px){
      .two,.three{grid-template-columns:1fr}
      h1{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>客訂／報價填寫</h1>
      <p class="sub">
        請填寫客訂或報價需求，送出前會先整理成標準文字，方便直接回傳 LINE 給生暉快速確認。
      </p>

      <div class="grid">
        <div>
          <label for="requestType">需求類型</label>
          <select id="requestType">
            <option value="客訂">客訂</option>
            <option value="報價">報價</option>
          </select>
        </div>

        <div>
          <label for="productName">商品名稱</label>
          <input id="productName" type="text" placeholder="例如：PP-D51K便當盒" />
        </div>

        <div>
          <label for="productSpec">規格／型號</label>
          <input id="productSpec" type="text" placeholder="例如：含蓋 / 中型 / 50入" />
        </div>

        <div class="three">
          <div>
            <label for="quantity">數量</label>
            <div class="qty-box">
              <button type="button" class="qty-btn" onclick="changeQty(-1)">−</button>
              <input id="quantity" class="qty-input" type="number" min="1" step="1" value="1" />
              <button type="button" class="qty-btn" onclick="changeQty(1)">＋</button>
            </div>
          </div>

          <div>
            <label for="unit">單位</label>
            <select id="unit">
              <option value="">請選擇</option>
              <option value="箱">箱</option>
              <option value="包">包</option>
              <option value="個">個</option>
              <option value="組">組</option>
              <option value="袋">袋</option>
              <option value="瓶">瓶</option>
              <option value="罐">罐</option>
            </select>
          </div>

          <div>
            <label for="pickupMethod">取貨方式</label>
            <select id="pickupMethod">
              <option value="自取">自取</option>
              <option value="貨運">貨運</option>
              <option value="外送">外送</option>
            </select>
          </div>
        </div>

        <div class="two">
          <div>
            <label for="targetDate">日期</label>
            <input id="targetDate" type="date" />
          </div>
          <div>
            <label for="note">備註</label>
            <input id="note" type="text" placeholder="例如：請先協助準備 / 請協助報價" />
          </div>
        </div>
      </div>

      <div class="btns">
        <button class="btn-generate" onclick="generateText()">產生標準文字</button>
      </div>

      <div class="output">
        <label for="outputText" class="section-title">標準文字</label>
        <textarea id="outputText" placeholder="按上方按鈕後，這裡會自動整理成可直接傳 LINE 的內容"></textarea>

        <div class="btns">
          <button class="btn-copy" onclick="copyText()">複製內容</button>
          <button class="btn-line" onclick="sendToLine()">一鍵傳 LINE</button>
        </div>
      </div>

      <div class="footer-note">
        建議：先按「產生標準文字」確認內容，再按「一鍵傳 LINE」。<br>
        一鍵傳 LINE 會直接開啟官方 LINE：@gogo-food。
      </div>
    </div>
  </div>

  <script>
    function clean(v){
      return (v || '').trim();
    }

    function line(label, value){
      const v = clean(value);
      return v ? `${label}：${v}` : '';
    }

    function formatDate(dateStr){
      if(!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      if(!y || !m || !d) return dateStr;
      return `${y}/${m}/${d}`;
    }

    function changeQty(diff){
      const qtyInput = document.getElementById('quantity');
      let current = parseInt(qtyInput.value || '1', 10);
      if (isNaN(current) || current < 1) current = 1;
      current += diff;
      if (current < 1) current = 1;
      qtyInput.value = current;
    }

    function generateText(){
      const requestType = document.getElementById('requestType').value;
      const productName = document.getElementById('productName').value;
      const productSpec = document.getElementById('productSpec').value;
      const quantity = document.getElementById('quantity').value;
      const unit = document.getElementById('unit').value;
      const pickupMethod = document.getElementById('pickupMethod').value;
      const targetDate = formatDate(document.getElementById('targetDate').value);
      const note = document.getElementById('note').value;

      if (!clean(productName)) {
        alert('請先填寫商品名稱');
        document.getElementById('productName').focus();
        return;
      }

      const qtyText = clean(quantity) || clean(unit)
        ? `${clean(quantity)}${clean(unit)}`
        : '';

      const lines = [
        '【生暉｜客訂／報價需求】',
        line('需求', requestType),
        line('商品', productName),
        line('規格', productSpec),
        line('數量', qtyText),
        line('取貨', pickupMethod),
        line('日期', targetDate),
        line('備註', note),
        '',
        '※實際價格、庫存與交期以門市確認為準'
      ].filter(Boolean);

      document.getElementById('outputText').value = lines.join('\n');
    }

    async function copyText(){
      const text = document.getElementById('outputText').value.trim();
      if(!text){
        alert('請先按「產生標準文字」');
        return;
      }
      try{
        await navigator.clipboard.writeText(text);
        alert('已複製內容');
      }catch(e){
        alert('複製失敗，請手動長按複製');
      }
    }

    function sendToLine(){
      const output = document.getElementById('outputText');
      let text = output.value.trim();

      if(!text){
        generateText();
        text = output.value.trim();
      }

      if(!text){
        alert('請先完成內容');
        return;
      }

      const encoded = encodeURIComponent(text);
      const url = `https://line.me/R/oaMessage/%40gogo-food/?${encoded}`;
      window.location.href = url;
    }
  </script>
</body>
</html>
