from pathlib import Path

html = """<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生暉｜客訂／留貨填寫</title>
<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
.container { max-width:500px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
textarea { width:100%; height:220px; margin-top:10px; }
button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; font-size:16px; }
.copy { background:#333; color:#fff; }
.line { background:#06C755; color:#fff; }
</style>
</head>

<body>
<div class="container">

<h2>客訂／留貨需求</h2>
<p>請填寫內容後，直接傳送到LINE</p>

<textarea id="orderText">
【生暉｜客訂／留貨需求】

客戶姓名：
聯絡電話：
需求類型：

商品名稱：
規格：
數量：
單位：

取貨方式：
取貨日期：

備註：

※實際價格與交期以門市確認為準
</textarea>

<button class="copy" onclick="copyText()">複製內容</button>
<button class="line" onclick="sendToLine()">一鍵傳LINE</button>

</div>

<script>
function copyText(){
  const text = document.getElementById('orderText').value;
  navigator.clipboard.writeText(text);
  alert("已複製內容");
}

function sendToLine(){
  const text = document.getElementById('orderText').value.trim();
  if(!text){
    alert("請先填寫內容");
    return;
  }
  const encoded = encodeURIComponent(text);
  const url = "https://line.me/R/oaMessage/%40gogo-food/?" + encoded;
  window.location.href = url;
}
</script>

</body>
</html>
"""

file_path = "/mnt/data/line-order-hold-v1-final.html"
Path(file_path).write_text(html, encoding='utf-8')
