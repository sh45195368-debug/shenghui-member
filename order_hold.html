<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生暉食品營運｜訂貨／留貨需求填寫</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f4f6f8;
      color: #2b2b2b;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px;
    }
    .hero {
      background: linear-gradient(135deg, #557c8a, #7aa0a6);
      color: #fff;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      margin-bottom: 16px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.3;
    }
    .hero p {
      margin: 0;
      line-height: 1.7;
      opacity: 0.95;
    }
    .notice {
      background: #fff7e8;
      border: 1px solid #f0d49a;
      color: #7a5610;
      padding: 12px 14px;
      border-radius: 12px;
      margin: 16px 0;
      font-size: 15px;
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 22px;
      color: #3e5d67;
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #53646b;
      font-weight: bold;
    }
    input[type="text"],
    input[type="tel"],
    textarea,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cfd8dd;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    .product-block {
      border: 1px solid #dbe3e8;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fbfcfd;
    }
    .product-block h3 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #31484f;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .summary {
      background: #f5fafb;
      border: 1px solid #d8eaee;
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
      line-height: 1.8;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .btn {
      border: 0;
      width: 100%;
      padding: 15px 18px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary {
      background: #4e7a85;
      color: #fff;
      margin-top: 14px;
    }
    .btn-primary:hover { opacity: 0.92; }
    .btn-line {
      background: #06c755;
      color: #fff;
      margin-top: 10px;
    }
    .btn-copy {
      background: #edf3f5;
      color: #48636b;
      margin-top: 10px;
    }
    .line-box {
      background: #f1fbf1;
      border: 1px solid #cfe9cf;
      color: #2f6a31;
      padding: 12px;
      border-radius: 12px;
      margin-top: 12px;
      line-height: 1.7;
      font-size: 14px;
      word-break: break-all;
    }
    .sticky-card {
      position: sticky;
      top: 18px;
    }
    .small {
      font-size: 13px;
      color: #6a7c83;
      margin-top: 4px;
      line-height: 1.6;
    }
    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 26px; }
      .sticky-card { position: static; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>訂貨／留貨需求填寫</h1>
      <p>請把需求整理好後送出。送出後會直接開啟生暉官方 LINE 對話，讓您把標準文字傳給我們，方便門市更快確認。</p>
    </div>

    <div class="notice">
      為避免來回確認造成時間延誤，請盡量把商品名稱、規格、數量、取貨方式與日期填完整。<br>
      ※ 實際價格、庫存與交期仍以門市確認為準。
    </div>

    <div class="grid">
      <!-- 左側填寫區 -->
      <div class="card">
        <h2>填寫需求內容</h2>

        <div class="field">
          <label for="requestType">需求類型</label>
          <select id="requestType" onchange="updateSummary()">
            <option value="訂貨">訂貨</option>
            <option value="留貨">留貨</option>
            <option value="客訂">客訂</option>
            <option value="預購">預購</option>
          </select>
        </div>

        <div class="field">
          <label for="customerName">姓名 / 店名</label>
          <input type="text" id="customerName" placeholder="例如：王先生 / 富利早餐加盟店" oninput="updateSummary()" />
        </div>

        <div class="field">
          <label for="customerPhone">手機號碼</label>
          <input type="tel" id="customerPhone" placeholder="例如：0912345678" oninput="updateSummary()" />
        </div>

        <div class="field">
          <label for="pickupMethod">取貨方式</label>
          <select id="pickupMethod" onchange="updateSummary()">
            <option value="門市自取">門市自取</option>
            <option value="外送">外送</option>
            <option value="配送">配送</option>
            <option value="其他">其他</option>
          </select>
        </div>

       <div class="field">
  <label for="pickupDate">希望日期</label>
  <input type="date" id="pickupDate" onchange="updateSummary()" />
</div>

        <div class="field">
          <label for="pickupTime">希望時段</label>
          <select id="pickupTime" onchange="updateSummary()">
            <option value="越快越好">越快越好</option>
            <option value="上午">上午</option>
            <option value="下午">下午</option>
            <option value="晚上">晚上</option>
            <option value="其他">其他</option>
          </select>
        </div>

        <div class="product-block">
          <h3>商品 1</h3>
          <div class="grid-2">
            <div class="field">
              <label for="product1Name">商品名稱</label>
              <input type="text" id="product1Name" placeholder="例如：PP-D51K便當盒" oninput="updateSummary()" />
            </div>
            <div class="field">
              <label for="product1Spec">規格／型號</label>
              <input type="text" id="product1Spec" placeholder="例如：含蓋 / 1000ml / 白色" oninput="updateSummary()" />
            </div>
            <div class="field">
              <label for="product1Qty">數量</label>
              <input type="text" id="product1Qty" placeholder="例如：1" oninput="updateSummary()" />
            </div>
            <div class="field">
              <label for="product1Unit">單位</label>
              <input type="text" id="product1Unit" placeholder="例如：箱 / 包 / 個 / 瓶" oninput="updateSummary()" />
            </div>
          </div>
        </div>

        <div class="product-block">
          <h3>商品 2（選填）</h3>
          <div class="grid-2">
            <div class="field">
              <label for="product2Name">商品名稱</label>
              <input type="text" id="product2Name" placeholder="例如：PP-D51K蓋子" oninput="updateSummary()" />
            </div>
            <div class="field">
              <label for="product2Spec">規格／型號</label>
              <input type="text" id="product2Spec" placeholder="例如：透明蓋" oninput="updateSummary()" />
            </div>
            <div class="field">
              <label for="product2Qty">數量</label>
              <input type="text" id="product2Qty" placeholder="例如：1" oninput="updateSummary()" />
            </div>
            <div class="field">
              <label for="product2Unit">單位</label>
              <input type="text" id="product2Unit" placeholder="例如：箱 / 包 / 個 / 瓶" oninput="updateSummary()" />
            </div>
          </div>
        </div>

        <div class="field">
          <label for="customerNote">備註</label>
          <textarea id="customerNote" placeholder="例如：請先協助保留 / 若缺貨請先通知 / 明天下午取貨" oninput="updateSummary()"></textarea>
        </div>
      </div>

      <!-- 右側摘要區 -->
      <div class="card sticky-card">
        <h2>標準訊息預覽</h2>

        <div class="summary" id="summaryBox">請先填寫需求內容</div>

        <button class="btn btn-primary" onclick="updateSummary(true)">重新產生文字</button>
        <button class="btn btn-copy" onclick="copyMessage()">複製內容</button>
        <button class="btn btn-line" onclick="sendToLine()">送出到官方 LINE</button>

        <div class="line-box">
          官方 LINE：@gogo-food<br>
          按下「送出到官方 LINE」後，會直接開啟官方 LINE 對話，並把整理好的文字帶進去。
        </div>

        <div class="small">
          建議送出前再確認一次商品名稱、規格、數量、日期與備註。
        </div>
      </div>
    </div>
  </div>

  <script>
    const LINE_OA_ID = '%40gogo-food';

    function value(id) {
      return document.getElementById(id).value.trim();
    }

    function productLine(name, spec, qty, unit, index) {
      if (!name && !spec && !qty && !unit) return '';
      let text = `商品${index}：${name || '未填'}\n`;
      if (spec) text += `規格${index}：${spec}\n`;
      if (qty || unit) text += `數量${index}：${qty || ''}${unit || ''}\n`;
      return text;
    }

    function buildMessage() {
      const requestType = value('requestType');
      const customerName = value('customerName');
      const customerPhone = value('customerPhone');
      const pickupMethod = value('pickupMethod');
      const pickupDate = formatDate(value('pickupDate'));
      const pickupTime = value('pickupTime');
      const note = value('customerNote');

      const product1 = productLine(
        value('product1Name'),
        value('product1Spec'),
        value('product1Qty'),
        value('product1Unit'),
        1
      );

      const product2 = productLine(
        value('product2Name'),
        value('product2Spec'),
        value('product2Qty'),
        value('product2Unit'),
        2
      );

      let msg = `【生暉｜${requestType || '訂貨／留貨'}需求】\n\n`;

      if (customerName) msg += `姓名/店名：${customerName}\n`;
      if (customerPhone) msg += `手機：${customerPhone}\n`;
      if (requestType) msg += `需求類型：${requestType}\n`;

      msg += `\n`;
      if (product1) msg += product1 + `\n`;
      if (product2) msg += product2 + `\n`;

      if (pickupMethod) msg += `取貨方式：${pickupMethod}\n`;
      if (pickupDate) msg += `希望日期：${pickupDate}\n`;
      if (pickupTime) msg += `希望時段：${pickupTime}\n`;
      if (note) msg += `備註：${note}\n`;

      msg += `\n※實際價格、庫存與交期以門市確認為準`;

      return msg.trim();
    }

    function updateSummary(showAlert = false) {
      const msg = buildMessage();
      document.getElementById('summaryBox').textContent = msg;
      if (showAlert) {
        alert('已重新產生標準文字');
      }
    }

    function copyMessage() {
      const msg = buildMessage();
      navigator.clipboard.writeText(msg).then(() => {
        alert('已複製內容');
      }).catch(() => {
        alert('複製失敗，請手動複製');
      });
    }

    function sendToLine() {
      const customerName = value('customerName');
      const customerPhone = value('customerPhone');
      const product1Name = value('product1Name');

      if (!customerName) {
        alert('請先填寫姓名 / 店名');
        return;
      }

      if (!customerPhone) {
        alert('請先填寫手機號碼');
        return;
      }

      if (!product1Name) {
        alert('請至少填寫商品 1 的商品名稱');
        return;
      }

      const msg = buildMessage();
      const lineUrl = `https://line.me/R/oaMessage/${LINE_OA_ID}/?${encodeURIComponent(msg)}`;
      window.location.href = lineUrl;
    }

    updateSummary();
  </script>
</body>
</html>
