<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>生暉食品營運｜客戶補貨系統</title>

<style>
  :root {
    --bg: #f3f6f7;
    --card: #ffffff;
    --text: #2f5560;
    --muted: #7b8b91;
    --line: #d8e2e6;
    --primary: #5f9eab;
    --primary-dark: #4d8894;
    --primary-soft: #eaf3f5;
    --accent: #f26b3a;
    --danger: #dc2626;
    --success-bg: #ecfdf5;
    --success-text: #166534;
    --error-bg: #fef2f2;
    --error-text: #991b1b;
    --shadow: 0 6px 18px rgba(0,0,0,0.05);
    --radius: 18px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, "Microsoft JhengHei", sans-serif;
  }

  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 16px;
  }

  .hero {
    background: linear-gradient(135deg, #5f9eab 0%, #78aeb9 100%);
    color: #fff;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  .hero h1 {
    margin: 0 0 8px;
    font-size: 24px;
  }

  .hero p {
    margin: 0;
    color: rgba(255,255,255,0.92);
    font-size: 14px;
    line-height: 1.6;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  .card h2 {
    margin: 0 0 10px;
    font-size: 18px;
  }

  .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .history-btn,
  .freq-btn,
  .search-btn {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 14px;
    padding: 12px;
    text-align: left;
    cursor: pointer;
    margin-bottom: 10px;
    transition: 0.2s ease;
    color: var(--text);
  }

  .history-btn:hover,
  .freq-btn:hover,
  .search-btn:hover {
    background: #f8fbfc;
    border-color: #c7d7dc;
  }

  .product-title,
  .history-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.45;
  }

  .meta {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
  }

  .search-input,
  .manual-input {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    color: var(--text);
    margin-bottom: 10px;
  }

  .search-input:focus,
  .manual-input:focus {
    border-color: var(--primary);
  }

  .toggle-wrap,
  .today-order-head,
  .manual-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .today-order-box {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
    background: #fff;
  }

  .today-order-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .today-order-items {
    margin-top: 8px;
    border-top: 1px dashed var(--line);
    padding-top: 8px;
  }

  .today-order-item {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }

  .order-item {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
    background: #fff;
  }

  .order-name {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 6px;
  }

  .order-meta {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .order-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .qty-input {
    width: 100px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 16px;
  }

  .unit-text {
    color: var(--muted);
    font-size: 14px;
  }

  .remove-btn {
    width: auto;
    border: none;
    background: #f3f4f6;
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    color: var(--text);
    margin: 0;
  }

  .remove-btn:hover {
    background: #e5e7eb;
  }

  .action-bar {
    display: grid;
    gap: 10px;
    margin-top: 12px;
  }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    cursor: pointer;
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--primary-dark);
  }

  .btn-primary:disabled {
    background: #9ca3af;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: #eef3f4;
    color: var(--text);
  }

  .btn-secondary:hover {
    background: #e3ecee;
  }

  .btn-accent {
    background: var(--accent);
    color: #fff;
  }

  .btn-accent:hover {
    opacity: 0.92;
  }

  .message {
    margin-top: 12px;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.6;
  }

  .success {
    background: var(--success-bg);
    color: var(--success-text);
  }

  .error {
    background: var(--error-bg);
    color: var(--error-text);
  }

  .empty {
    color: var(--muted);
    font-size: 14px;
    padding: 10px 0;
  }

  .manual-area {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }

  .manual-area.show {
    display: block;
  }
</style>
</head>
<body>
  <div class="container">

    <div class="hero">
      <h1>客戶補貨系統</h1>
      <p>可直接複製最近訂單、加入常用商品、搜尋過去買過的商品，或手動新增未買過商品後送出補貨單。</p>
    </div>

    <div class="card">
      <h2>客戶資料</h2>
      <div id="customerInfo" class="sub">讀取中...</div>
      <div class="sub" style="margin-bottom:0;">實際價格、庫存與交期以門市確認為準。</div>
    </div>

    <div class="card">
      <h2>今日已送出訂單</h2>
      <div class="sub">可查看今天已送出的內容，避免重複下單，也可直接複製為新訂單。</div>
      <div id="todaySubmittedOrders">讀取中...</div>
    </div>

    <div class="card">
      <h2>最近 5 筆訂單</h2>
      <div class="sub">適合直接複製整張訂單後再微調。</div>
      <div id="historyList">讀取中...</div>
    </div>

    <div class="card">
      <div class="toggle-wrap">
        <div>
          <h2 style="margin-bottom:6px;">常用商品前20</h2>
          <div class="sub" style="margin-bottom:0;">預設收合，點右側可展開。</div>
        </div>
        <button id="toggleFrequentBtn" class="btn btn-secondary" type="button" onclick="toggleFrequent()" style="width:auto;padding:10px 14px;">
          展開
        </button>
      </div>

      <div id="frequentList" style="margin-top:14px;"></div>
    </div>

    <div class="card">
      <h2>商品搜尋</h2>
      <div class="sub">只搜尋此客戶過去買過的商品。預設不顯示，輸入後才出現。</div>
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="輸入商品名稱或商品編號"
        oninput="renderSearchResults()"
      />
      <div id="searchResultList" style="margin-top:12px;"></div>

      <div class="manual-head" style="margin-top:12px;">
        <div class="sub" style="margin:0;">找不到商品時，可手動新增。</div>
        <button class="btn btn-secondary" type="button" onclick="toggleManualItemArea()" style="width:auto;padding:10px 14px;">
          找不到商品？
        </button>
      </div>

      <div id="manualItemArea" class="manual-area">
        <input id="manualProductName" class="manual-input" type="text" placeholder="商品名稱，例如：發酵奶油" />
        <input id="manualProductSpec" class="manual-input" type="text" placeholder="規格 / 備註，例如：1kg、25kg、紅蓋" />
        <input id="manualProductQty" class="manual-input" type="number" min="1" step="1" placeholder="數量" />
        <button class="btn btn-accent" type="button" onclick="addManualItem()">加入本次訂單</button>
      </div>
    </div>

    <div class="card">
      <h2>本次訂單</h2>
      <div class="sub">可混合：最近訂單複製＋常用商品加入＋搜尋商品加入＋手動新增商品。</div>
      <div id="currentOrder" class="empty">請先從上方加入商品</div>

      <div class="action-bar">
        <button id="submitBtn" class="btn btn-primary" onclick="submitOrder()" disabled>送出訂單</button>
        <button class="btn btn-secondary" onclick="clearCurrentOrder()">清空本次訂單</button>
      </div>

      <div id="messageBox"></div>
    </div>

  </div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbweZBWhONuIARJhGgVY2n-EPhxfWEb79akP3pM3r7D4ivg4n-4AZR79Inhxe_pzCSpO-A/exec';

  let token = '';
  let customerId = '';
  let customerName = '';

  let recentOrders = [];
  let frequentItems = [];
  let searchableItems = [];
  let todaySubmittedOrders = [];
  let currentItems = [];

  let frequentExpanded = false;

  function getTokenFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token') || '';
  }

  async function loadDashboard() {
    token = getTokenFromUrl();

    if (!token) {
      setError('網址缺少 token');
      document.getElementById('customerInfo').textContent = '無法辨識客戶';
      document.getElementById('todaySubmittedOrders').innerHTML = '<div class="empty">無法辨識客戶</div>';
      return;
    }

    try {
      const res = await fetch(API_URL + '?action=dashboard&token=' + encodeURIComponent(token));
      const data = await res.json();

      if (!data.success) {
        setError(data.message || '讀取失敗');
        document.getElementById('customerInfo').textContent = '無法辨識客戶';
        document.getElementById('todaySubmittedOrders').innerHTML = '<div class="empty">讀取失敗</div>';
        return;
      }

      customerId = data.customer_id || '';
      customerName = data.customer_name || '';
      recentOrders = data.recent_orders || [];
      frequentItems = (data.frequent_items || []).slice(0, 20);
      searchableItems = data.searchable_items || [];
      todaySubmittedOrders = data.today_submitted_orders || [];

      document.getElementById('customerInfo').textContent = `${customerName}（${customerId}）`;

      renderTodaySubmittedOrders();
      renderHistory();
      renderFrequent();
      renderSearchResults();
      renderCurrentOrder();

    } catch (err) {
      setError('讀取資料失敗：' + err.message);
      document.getElementById('todaySubmittedOrders').innerHTML = '<div class="empty">讀取失敗</div>';
    }
  }

  function renderTodaySubmittedOrders() {
    const el = document.getElementById('todaySubmittedOrders');

    if (!todaySubmittedOrders.length) {
      el.innerHTML = '<div class="empty">今天尚未送出訂單</div>';
      return;
    }

    el.innerHTML = todaySubmittedOrders.map((order, index) => `
      <div class="today-order-box">
        <div class="today-order-head">
          <div class="today-order-title">訂單編號：${escapeHtml(order.order_no)}</div>
          <div class="meta">送出時間：${escapeHtml(order.submit_time)}</div>
        </div>

        <div style="margin-top:10px;">
          <button
            class="btn btn-secondary"
            type="button"
            onclick="copyTodaySubmittedOrder(${index})"
            style="width:auto;padding:10px 14px;"
          >
            複製為新訂單
          </button>
        </div>

        <div class="today-order-items">
          ${order.items.map(item => `
            <div class="today-order-item">
              ${escapeHtml(item.product_name)}　${Number(item.qty)}　${escapeHtml(item.unit || '')}
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  function copyTodaySubmittedOrder(index) {
    const selected = todaySubmittedOrders[index];
    if (!selected || !selected.items) return;

    currentItems = selected.items.map(item => ({
      product_id: item.product_id || 'NEW',
      product_name: item.product_name || '',
      unit: item.unit || '',
      qty: Number(item.qty) || 0
    }));

    mergeCurrentItems();
    renderCurrentOrder();
    clearMessage();

    const orderArea = document.getElementById('currentOrder');
    if (orderArea) {
      orderArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function renderHistory() {
    const el = document.getElementById('historyList');

    if (!recentOrders.length) {
      el.innerHTML = '<div class="empty">目前沒有歷史訂單</div>';
      return;
    }

    el.innerHTML = recentOrders.map((order, index) => `
      <button class="history-btn" onclick="copyRecentOrder(${index})">
        <div class="history-title">${escapeHtml(order.order_date)}</div>
        <div class="meta">共 ${order.items.length} 項商品，點我直接複製</div>
      </button>
    `).join('');
  }

  function toggleFrequent() {
    frequentExpanded = !frequentExpanded;
    renderFrequent();
  }

  function renderFrequent() {
    const el = document.getElementById('frequentList');
    const btn = document.getElementById('toggleFrequentBtn');

    if (!frequentItems.length) {
      el.innerHTML = '<div class="empty">目前沒有常用商品資料</div>';
      btn.textContent = '展開';
      return;
    }

    if (!frequentExpanded) {
      el.innerHTML = '<div class="empty">已收合，點右上「展開」查看常用商品</div>';
      btn.textContent = '展開';
      return;
    }

    btn.textContent = '收合';

    el.innerHTML = frequentItems.map((item, index) => `
      <button class="freq-btn" onclick="addFrequentItem(${index})">
        <div class="product-title">${index + 1}. ${escapeHtml(item.product_name)}</div>
        <div class="meta">
          商品編號：${escapeHtml(item.product_id)}<br>
          單位：${escapeHtml(item.unit)}｜下單次數：${Number(item.order_count || 0)}
        </div>
      </button>
    `).join('');
  }

  function renderSearchResults() {
    const keyword = (document.getElementById('searchInput').value || '').trim().toLowerCase();
    const el = document.getElementById('searchResultList');

    if (!keyword) {
      el.innerHTML = '';
      return;
    }

    let result = searchableItems.filter(item => {
      return (
        String(item.product_name || '').toLowerCase().includes(keyword) ||
        String(item.product_id || '').toLowerCase().includes(keyword) ||
        String(item.unit || '').toLowerCase().includes(keyword)
      );
    }).slice(0, 20);

    if (!result.length) {
      el.innerHTML = '<div class="empty">查無符合商品</div>';
      return;
    }

    el.innerHTML = result.map(item => `
      <button class="search-btn" onclick="addSearchItem('${escapeJs(item.product_id)}','${escapeJs(item.product_name)}','${escapeJs(item.unit)}')">
        <div class="product-title">${escapeHtml(item.product_name)}</div>
        <div class="meta">
          商品編號：${escapeHtml(item.product_id)}<br>
          單位：${escapeHtml(item.unit)}｜下單次數：${Number(item.order_count || 0)}
        </div>
      </button>
    `).join('');
  }

  function toggleManualItemArea() {
    const el = document.getElementById('manualItemArea');
    el.classList.toggle('show');
  }

  function addManualItem() {
    const name = (document.getElementById('manualProductName').value || '').trim();
    const spec = (document.getElementById('manualProductSpec').value || '').trim();
    const qty = Number(document.getElementById('manualProductQty').value || 0);

    if (!name) {
      setError('請輸入商品名稱');
      return;
    }

    if (qty <= 0) {
      setError('請輸入正確數量');
      return;
    }

    currentItems.push({
      product_id: 'NEW',
      product_name: name,
      unit: spec,
      qty: qty
    });

    mergeCurrentItems();
    renderCurrentOrder();
    clearMessage();

    document.getElementById('manualProductName').value = '';
    document.getElementById('manualProductSpec').value = '';
    document.getElementById('manualProductQty').value = '';
  }

  function copyRecentOrder(index) {
    const selected = recentOrders[index];
    if (!selected) return;

    currentItems = selected.items.map(item => ({
      product_id: item.product_id,
      product_name: item.product_name,
      unit: item.unit,
      qty: Number(item.qty) || 0
    }));

    mergeCurrentItems();
    renderCurrentOrder();
    clearMessage();
  }

  function addFrequentItem(index) {
    const item = frequentItems[index];
    if (!item) return;

    currentItems.push({
      product_id: item.product_id,
      product_name: item.product_name,
      unit: item.unit,
      qty: 1
    });

    mergeCurrentItems();
    renderCurrentOrder();
    clearMessage();
  }

  function addSearchItem(productId, productName, unit) {
    currentItems.push({
      product_id: productId,
      product_name: productName,
      unit: unit,
      qty: 1
    });

    mergeCurrentItems();
    renderCurrentOrder();
    clearMessage();
  }

  function mergeCurrentItems() {
    const map = {};

    currentItems.forEach(item => {
      const safeUnit = item.unit || '';
      const key = item.product_id + '||' + safeUnit + '||' + item.product_name;

      if (!map[key]) {
        map[key] = {
          product_id: item.product_id,
          product_name: item.product_name,
          unit: safeUnit,
          qty: 0
        };
      }

      map[key].qty += Number(item.qty) || 0;
    });

    currentItems = Object.values(map).filter(item => item.qty > 0);
  }

  function renderCurrentOrder() {
    const el = document.getElementById('currentOrder');
    const btn = document.getElementById('submitBtn');

    if (!currentItems.length) {
      el.innerHTML = '<div class="empty">請先從上方加入商品</div>';
      btn.disabled = true;
      return;
    }

    el.innerHTML = currentItems.map((item, index) => `
      <div class="order-item">
        <div class="order-name">${escapeHtml(item.product_name)}</div>
        <div class="order-meta">
          商品編號：${escapeHtml(item.product_id)}<br>
          規格 / 備註：${escapeHtml(item.unit || '')}
        </div>

        <div class="order-actions">
          <input
            class="qty-input"
            type="number"
            min="0"
            step="1"
            value="${Number(item.qty)}"
            onchange="updateQty(${index}, this.value)"
          />
          <div class="unit-text">${escapeHtml(item.unit || '')}</div>
          <button class="remove-btn" type="button" onclick="removeItem(${index})">刪除</button>
        </div>
      </div>
    `).join('');

    btn.disabled = false;
  }

  function updateQty(index, value) {
    const qty = Number(value);
    currentItems[index].qty = isNaN(qty) ? 0 : qty;
    currentItems = currentItems.filter(item => item.qty > 0);
    renderCurrentOrder();
  }

  function removeItem(index) {
    currentItems.splice(index, 1);
    renderCurrentOrder();
  }

  function clearCurrentOrder() {
    currentItems = [];
    renderCurrentOrder();
    clearMessage();
  }

  async function submitOrder() {
    clearMessage();

    const validItems = currentItems.filter(item => Number(item.qty) > 0);

    if (!token) {
      setError('缺少 token');
      return;
    }

    if (!validItems.length) {
      setError('請至少保留一項數量大於 0 的商品');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送出中...';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          token: token,
          items: validItems
        })
      });

      const data = await res.json();

      if (!data.success) {
        setError(data.message || '送出失敗');
        return;
      }

      setSuccess(`送出成功，訂單編號：${data.order_no}`);
      clearCurrentOrder();
      await loadDashboard();

    } catch (err) {
      setError('送出失敗：' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '送出訂單';
    }
  }

  function setSuccess(msg) {
    document.getElementById('messageBox').innerHTML =
      `<div class="message success">${escapeHtml(msg)}</div>`;
  }

  function setError(msg) {
    document.getElementById('messageBox').innerHTML =
      `<div class="message error">${escapeHtml(msg)}</div>`;
  }

  function clearMessage() {
    document.getElementById('messageBox').innerHTML = '';
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function escapeJs(str) {
    return String(str)
      .replaceAll('\\', '\\\\')
      .replaceAll("'", "\\'")
      .replaceAll('"', '\\"');
  }

  loadDashboard();
</script>
</body>
</html>
