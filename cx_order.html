<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客戶補貨系統</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
      color: #222;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h1, h2 {
      margin: 0 0 12px;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    .history-btn, .freq-btn {
      display: block;
      width: 100%;
      text-align: left;
      border: 1px solid #ddd;
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 15px;
    }
    .history-btn:hover, .freq-btn:hover {
      background: #f9f9f9;
    }
    .freq-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }
    .item-row {
      display: grid;
      grid-template-columns: 1fr 100px 70px 60px;
      gap: 8px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .item-row:last-child {
      border-bottom: none;
    }
    .item-name {
      font-size: 15px;
      line-height: 1.4;
    }
    .unit, .small {
      color: #666;
      font-size: 13px;
    }
    input[type="number"] {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .btn {
      display: inline-block;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 16px;
    }
    .btn-primary {
      background: #111;
      color: #fff;
      width: 100%;
    }
    .btn-danger {
      background: #ef4444;
      color: #fff;
      width: 100%;
      margin-top: 10px;
    }
    .btn-primary:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .success {
      background: #edf8ed;
      color: #166534;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
    }
    .error {
      background: #fdecec;
      color: #b91c1c;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
    }
    .empty {
      color: #666;
      padding: 12px 0;
    }
    .remove-btn {
      border: none;
      background: #eee;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>客戶補貨系統</h1>
      <div id="customerInfo" class="muted">讀取中...</div>
    </div>

    <div class="card">
      <h2>最近 5 筆訂單</h2>
      <div id="historyList">讀取中...</div>
    </div>

    <div class="card">
      <h2>常用商品前 30</h2>
      <div id="frequentList">讀取中...</div>
    </div>

    <div class="card">
      <h2>本次訂單</h2>
      <div id="currentOrder" class="empty">請先點選上方某一筆訂單複製，或從常用商品加入</div>
      <button id="submitBtn" class="btn btn-primary" onclick="submitOrder()" disabled>送出訂單</button>
      <button class="btn btn-danger" onclick="clearCurrentOrder()">清空本次訂單</button>
      <div id="messageBox"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxd1QNAqqavItWzGY35ko8mRWDoEgjDnnn--3PMv2PxqcpgX3m9eBuEJ-G7Xcat46mhDA/exec';

    let token = '';
    let customerId = '';
    let customerName = '';
    let currentItems = [];
    let historyOrders = [];
    let frequentItems = [];

    function getTokenFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    async function loadData() {
      token = getTokenFromUrl();

      if (!token) {
        showError('網址缺少 token');
        document.getElementById('customerInfo').textContent = '無法辨識客戶';
        document.getElementById('historyList').innerHTML = '';
        document.getElementById('frequentList').innerHTML = '';
        return;
      }

      try {
        const url = `${API_URL}?action=history&token=${encodeURIComponent(token)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (!data.success) {
          showError(data.message || '讀取失敗');
          document.getElementById('customerInfo').textContent = '無法辨識客戶';
          return;
        }

        customerId = data.customer_id;
        customerName = data.customer_name;
        historyOrders = data.orders || [];
        frequentItems = data.frequent_items || [];

        document.getElementById('customerInfo').textContent =
          `${customerName}（${customerId}）`;

        renderHistory();
        renderFrequent();
        renderCurrentOrder();

      } catch (err) {
        showError('讀取資料失敗：' + err.message);
      }
    }

    function renderHistory() {
      const el = document.getElementById('historyList');

      if (!historyOrders.length) {
        el.innerHTML = '<div class="empty">目前沒有歷史訂單</div>';
        return;
      }

      el.innerHTML = historyOrders.map((order, index) => `
        <button class="history-btn" onclick="copyHistoryOrder(${index})">
          <div><strong>${order.order_date}</strong></div>
          <div class="muted">共 ${order.items.length} 項，點我直接複製</div>
        </button>
      `).join('');
    }

    function renderFrequent() {
      const el = document.getElementById('frequentList');

      if (!frequentItems.length) {
        el.innerHTML = '<div class="empty">目前沒有常用商品資料</div>';
        return;
      }

      el.innerHTML = `<div class="freq-grid">` + frequentItems.map((item, index) => `
        <button class="freq-btn" onclick="addFrequentItem(${index})">
          <div><strong>${escapeHtml(item.product_name)}</strong></div>
          <div class="small">商品編號：${escapeHtml(item.product_id)}</div>
          <div class="small">單位：${escapeHtml(item.unit)}｜下單次數：${item.order_count}</div>
        </button>
      `).join('') + `</div>`;
    }

    function copyHistoryOrder(index) {
      const selected = historyOrders[index];
      if (!selected) return;

      currentItems = selected.items.map(item => ({
        product_id: item.product_id,
        product_name: item.product_name,
        unit: item.unit,
        qty: item.qty
      }));

      mergeCurrentItems();
      renderCurrentOrder();
      clearMessage();
    }

    function addFrequentItem(index) {
      const item = frequentItems[index];
      if (!item) return;

      currentItems.push({
        product_id: item.product_id,
        product_name: item.product_name,
        unit: item.unit,
        qty: 1
      });

      mergeCurrentItems();
      renderCurrentOrder();
      clearMessage();
    }

    function mergeCurrentItems() {
      const map = {};

      currentItems.forEach(item => {
        const key = item.product_id + '||' + item.unit;
        if (!map[key]) {
          map[key] = {
            product_id: item.product_id,
            product_name: item.product_name,
            unit: item.unit,
            qty: 0
          };
        }
        map[key].qty += Number(item.qty) || 0;
      });

      currentItems = Object.values(map).filter(item => item.qty > 0);
    }

    function renderCurrentOrder() {
      const el = document.getElementById('currentOrder');
      const btn = document.getElementById('submitBtn');

      if (!currentItems.length) {
        el.innerHTML = '<div class="empty">請先點選上方某一筆訂單複製，或從常用商品加入</div>';
        btn.disabled = true;
        return;
      }

      el.innerHTML = currentItems.map((item, index) => `
        <div class="item-row">
          <div class="item-name">
            <div>${escapeHtml(item.product_name)}</div>
            <div class="unit">商品編號：${escapeHtml(item.product_id)}｜單位：${escapeHtml(item.unit)}</div>
          </div>
          <div>
            <input type="number" min="0" step="1" value="${item.qty}" onchange="updateQty(${index}, this.value)" />
          </div>
          <div>${escapeHtml(item.unit)}</div>
          <div>
            <button class="remove-btn" onclick="removeItem(${index})">刪除</button>
          </div>
        </div>
      `).join('');

      btn.disabled = false;
    }

    function updateQty(index, value) {
      const qty = Number(value);
      currentItems[index].qty = isNaN(qty) ? 0 : qty;
      currentItems = currentItems.filter(item => item.qty > 0);
      renderCurrentOrder();
    }

    function removeItem(index) {
      currentItems.splice(index, 1);
      renderCurrentOrder();
    }

    function clearCurrentOrder() {
      currentItems = [];
      renderCurrentOrder();
      clearMessage();
    }

    async function submitOrder() {
      clearMessage();

      if (!token) {
        showError('缺少 token');
        return;
      }

      const validItems = currentItems.filter(item => Number(item.qty) > 0);

      if (!validItems.length) {
        showError('請至少保留一項數量大於 0 的商品');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '送出中...';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            token: token,
            items: validItems
          })
        });

        const data = await res.json();

        if (!data.success) {
          showError(data.message || '送出失敗');
          return;
        }

        showSuccess(`送出成功，訂單編號：${data.order_no}`);
        clearCurrentOrder();
      } catch (err) {
        showError('送出失敗：' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '送出訂單';
      }
    }

    function showSuccess(msg) {
      document.getElementById('messageBox').innerHTML =
        `<div class="success">${escapeHtml(msg)}</div>`;
    }

    function showError(msg) {
      document.getElementById('messageBox').innerHTML =
        `<div class="error">${escapeHtml(msg)}</div>`;
    }

    function clearMessage() {
      document.getElementById('messageBox').innerHTML = '';
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    loadData();
  </script>
</body>
</html>
