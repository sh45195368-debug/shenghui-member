<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>客戶補貨系統</title>

<style>
:root{
  --main:#5f9ea0;
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
  --danger:#dc2626;
}

body{
  margin:0;
  font-family:Arial,"Microsoft JhengHei";
  background:var(--bg);
}

.container{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* 🔥 Header */
.hero{
  background:linear-gradient(135deg,#5f9ea0,#6faeb0);
  color:white;
  border-radius:18px;
  padding:20px;
  margin-bottom:16px;
}

.hero h1{
  margin:0;
  font-size:22px;
}

.hero p{
  margin-top:6px;
  font-size:14px;
}

/* 卡片 */
.card{
  background:white;
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
}

/* 標題 */
h2{
  margin:0 0 10px;
}

/* 按鈕 */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
}

.btn-primary{
  background:#111;
  color:white;
}

.btn-secondary{
  background:#eee;
}

/* 🔥 收合 */
.toggle{
  cursor:pointer;
  font-weight:bold;
}

/* 🔥 商品卡 */
.item{
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}

.small{
  color:var(--muted);
  font-size:12px;
}

input{
  width:80px;
  padding:6px;
  font-size:16px;
}

.hidden{
  display:none;
}

.success{
  background:#ecfdf5;
  padding:10px;
  border-radius:10px;
}

.error{
  background:#fef2f2;
  padding:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>客戶補貨系統</h1>
<p>可複製訂單、補常用商品或搜尋商品後送出</p>
</div>

<div class="card">
<h2>客戶資料</h2>
<div id="customerInfo">讀取中...</div>
</div>

<!-- 最近訂單 -->
<div class="card">
<h2>最近5筆訂單</h2>
<div id="history"></div>
</div>

<!-- 常用商品（收合） -->
<div class="card">
<div class="toggle" onclick="toggleFrequent()">
常用商品前20 ▼
</div>
<div id="frequent" class="hidden"></div>
</div>

<!-- 搜尋（預設空） -->
<div class="card">
<h2>商品搜尋</h2>
<input id="search" placeholder="輸入商品" oninput="renderSearch()" />
<div id="searchResult"></div>
</div>

<!-- 訂單 -->
<div class="card">
<h2>本次訂單</h2>
<div id="order"></div>

<button class="btn btn-primary" onclick="submitOrder()">送出訂單</button>
<button class="btn btn-secondary" onclick="clearOrder()">清空</button>

<div id="msg"></div>
</div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyaXNyIXqADwF1JjKJPI12gLbHCL9ZmQSVyATwDlRnlvx5hqsdQi1OYNMSfRDiWsTeSxQ/exec';

let token = new URLSearchParams(location.search).get('token');
let current = [];
let frequentData = [];
let searchPool = [];
let recent = [];

async function load(){
  let res = await fetch(API_URL+"?action=dashboard&token="+token);
  let data = await res.json();

  document.getElementById('customerInfo').innerText =
    data.customer_name+" ("+data.customer_id+")";

  recent = data.recent_orders;
  frequentData = data.frequent_items;
  searchPool = data.searchable_items;

  renderHistory();
}

function renderHistory(){
  let html="";
  recent.forEach((o,i)=>{
    html+=`
    <div class="item" onclick="copyOrder(${i})">
    ${o.order_date}（${o.items.length}項）
    </div>`;
  });
  document.getElementById('history').innerHTML=html;
}

function copyOrder(i){
  current = JSON.parse(JSON.stringify(recent[i].items));
  renderOrder();
}

function toggleFrequent(){
  let el=document.getElementById('frequent');
  if(el.classList.contains('hidden')){
    el.classList.remove('hidden');
    renderFrequent();
  }else{
    el.classList.add('hidden');
  }
}

function renderFrequent(){
  let html="";
  frequentData.forEach((p,i)=>{
    html+=`
    <div class="item" onclick="addItem('${p.product_id}','${p.product_name}','${p.unit}')">
    ${i+1}. ${p.product_name}
    <div class="small">${p.unit}</div>
    </div>`;
  });
  document.getElementById('frequent').innerHTML=html;
}

function renderSearch(){
  let kw=document.getElementById('search').value.toLowerCase();
  if(!kw){
    document.getElementById('searchResult').innerHTML="";
    return;
  }

  let list=searchPool.filter(p=>
    p.product_name.toLowerCase().includes(kw)
  ).slice(0,20);

  let html="";
  list.forEach(p=>{
    html+=`
    <div class="item" onclick="addItem('${p.product_id}','${p.product_name}','${p.unit}')">
    ${p.product_name}
    <div class="small">${p.unit}</div>
    </div>`;
  });

  document.getElementById('searchResult').innerHTML=html;
}

function addItem(id,name,unit){
  current.push({product_id:id,product_name:name,unit:unit,qty:1});
  merge();
  renderOrder();
}

function merge(){
  let map={};
  current.forEach(i=>{
    let k=i.product_id+i.unit;
    if(!map[k]) map[k]=i;
    else map[k].qty+=i.qty;
  });
  current=Object.values(map);
}

function renderOrder(){
  let html="";
  current.forEach((p,i)=>{
    html+=`
    <div class="item">
    ${p.product_name}
    <br>
    <input value="${p.qty}" onchange="changeQty(${i},this.value)" />
    ${p.unit}
    <button onclick="remove(${i})">刪</button>
    </div>`;
  });
  document.getElementById('order').innerHTML=html;
}

function changeQty(i,v){
  current[i].qty=parseInt(v)||0;
}

function remove(i){
  current.splice(i,1);
  renderOrder();
}

function clearOrder(){
  current=[];
  renderOrder();
}

async function submitOrder(){
  let res = await fetch(API_URL,{
    method:'POST',
    body:JSON.stringify({
      token:token,
      items:current
    })
  });
  let data = await res.json();

  document.getElementById('msg').innerHTML =
    `<div class="success">送出成功</div>`;
}

load();
</script>

</body>
</html>
